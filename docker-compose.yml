version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todo-sqlserver
    environment:
      SA_PASSWORD: Your@Password123
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      # Usar caminho relativo do host para melhor compatibilidade
      - ./sqlserver-data:/var/opt/mssql/data
      - ./sqlserver-log:/var/opt/mssql/log
      - ./sqlserver-backup:/var/opt/mssql/backup
    restart: unless-stopped

  todo-api:
    build:
      context: .
      dockerfile: Todo.Api/Dockerfile
    container_name: todo-api-container
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - sqlserver
    links:
      - sqlserver
    restart: unless-stopped



